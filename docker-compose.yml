version: "3.9"

# ============================================================
#  MyAI Platform - Personal AI Hub
#  RTX 4070 Super / 32GB RAM / 930GB HDD
# ============================================================

services:

  # ── 1. FastAPI 백엔드 ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}          # 선택 (나중에 추가)
      - OLLAMA_URL=http://ollama:11434
      - CHROMA_URL=http://chromadb:8001
      - DATABASE_URL=sqlite:////data/sqlite/myai.db
      - SECRET_KEY=${SECRET_KEY:-myai-secret-key-change-me}
      - STABILITY_API_KEY=${STABILITY_API_KEY:-}    # 선택 (이미지생성)
    volumes:
      - ./data:/data
      - ./backend:/app
    depends_on:
      - chromadb
      - ollama
    networks:
      - myai-net
  # ── 2. React 프론트엔드 ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: myai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - myai-net

  # ── 3. ChromaDB (벡터 DB - 자기학습/메모리) ──────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: myai-chromadb
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8001
    networks:
      - myai-net

  # ── 4. Ollama (로컬 LLM - 무료) ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: myai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/models:/root/.ollama
    networks:
      - myai-net
  # ── 5. Nginx 리버스 프록시 ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: myai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - myai-net

networks:
  myai-net:
    driver: bridge

volumes:
  chroma-data:
  model-data:
